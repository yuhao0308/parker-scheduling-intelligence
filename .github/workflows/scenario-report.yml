name: Scenario Report

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  scenario-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run test suite
        run: python -m pytest -q

      - name: Generate scenario report
        run: python scripts/generate_scenario_report.py --output-dir artifacts/scenario-report

      - name: Upload scenario report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scenario-report
          path: artifacts/scenario-report
