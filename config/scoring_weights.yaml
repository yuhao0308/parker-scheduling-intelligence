weights:
  overtime_headroom: 0.40    # biggest financial lever — avoid premium pay
  clinical_fit: 0.30         # subacute vs LT match — patient safety (up from 0.22)
  proximity: 0.20            # mobilization likelihood — closer = more likely to show up
  float_penalty: 0.10        # protect new hires on home unit (down from 0.13)
  historical_acceptance: 0.10 # prevents burnout loop (up from 0.05)

thresholds:
  max_relevant_distance_miles: 30
  max_candidates_returned: 10
  new_hire_months: 6         # tenure threshold for amplified float penalty

clinical_fit_scores:
  exact_match: 1.0           # home unit or cross-trained for target typology
  subacute_to_lt: 0.8        # subacute staff covering LT — acceptable
  lt_to_subacute: 0.0        # LT-only staff covering subacute — severe penalty

float_penalty_values:
  home_unit: 0.0             # no penalty — target is home unit
  same_typology: 0.3         # different unit, same type (LT→LT or subacute→subacute)
  cross_typology: 0.6        # different unit, different type
  new_hire_multiplier: 1.5   # amplify penalty for staff < new_hire_months tenure
